version: 1
project:
  name: generic-web-app
  rootDir: ..
artifacts:
  rootDir: ui-evidence/screenshots
  notesLanguage: en
  reportLanguage: en
  overviewViewport: mobile-390
capture:
  baseUrl: http://127.0.0.1:3000
  browser:
    headless: true
    freezeAnimations: true
    waitForFonts: true
    waitForNetworkIdleMs: 1500
  viewports:
    - id: mobile-390
      device: iPhone 13
      viewport:
        width: 390
        height: 844
      locale: en-US
      timezoneId: UTC
    - id: desktop-1440
      viewport:
        width: 1440
        height: 1024
      locale: en-US
      timezoneId: UTC
servers:
  after:
    command: npm run dev
    baseUrl: http://127.0.0.1:3000
baseline:
  git:
    ref: main
    worktreeDir: ui-evidence/tmp/baseline/main
    installCommand: npm ci
    server:
      command: npm run dev
      baseUrl: http://127.0.0.1:3000
      readyUrl: http://127.0.0.1:3000
      timeoutMs: 90000
report:
  language: en
  checklist:
    - layout
    - spacing
    - copy regression
stages:
  - id: marketing-home
    title: Marketing Home
    description: Public landing page review.
    defaultViewports:
      - mobile-390
      - desktop-1440
    screens:
      - id: home
        fileId: home
        label: Home
        path: /
        waitFor:
          selector: body
